name: CD - Deploy to production

on:
  workflow_run:
    workflows: ["CI - Run Tests"] # Must match ci.yml name exactly
    types:
      - completed
    branches:
      - main # Only trigger when CI ran on main

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    # CRITICAL: Only deploy if the CI workflow actually passed
    # Without this, deploy runs even when tests fail
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploying
        run: npm test

      - name: Deploy to Render
        run: |
          curl --fail -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          echo 'Deployment triggered successfully!'
